<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>beeper — toy subtractive synth</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="vendor/xterm.min.css">
<style>
  html, body {
    margin: 0; height: 100%;
    background: #0a0a0a; color: #ddd;
    font-family: ui-monospace, Menlo, monospace;
    display: flex; align-items: center; justify-content: center;
  }
  #wrap { position: relative; }
  #term { padding: 8px; background: #000; border: 1px solid #222; }
  #start {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column; gap: 1em;
    align-items: center; justify-content: center;
    background: #000; cursor: pointer; text-align: center;
  }
  #start h1 { color: #4fd6e0; font-size: 1.4em; margin: 0; }
  #start p  { color: #888; margin: 0; }
  .xterm { cursor: default; }
</style>
</head>
<body>
<div id="wrap">
  <div id="term"></div>
  <div id="start">
    <h1>beeper</h1>
    <p>a toy subtractive synth &mdash; keyboard required</p>
    <p><b style="color:#eee">click to start audio</b></p>
  </div>
</div>

<script src="vendor/xterm.min.js"></script>
<script>
  const COLS = 100, ROWS = 32;

  const term = new Terminal({
    cols: COLS, rows: ROWS,
    scrollback: 0,
    fontSize: 15,
    fontFamily: 'ui-monospace, Menlo, Consolas, monospace',
    theme: { background: '#000000', foreground: '#cccccc' },
  });
  term.open(document.getElementById('term'));
  window.__term = term;   // debug/smoke-test handle

  // Emscripten runtime config: the C side calls Module.termWrite for
  // output and reads termCols/termRows at tui_init.
  var Module = {
    termCols: COLS,
    termRows: ROWS,
    termWrite: (bytes) => term.write(bytes),
    onRuntimeInitialized: () => {
      term.onData((data) => {
        const bytes = new TextEncoder().encode(data);
        for (const b of bytes) Module._tui_web_push_byte(b);
      });
      term.focus();
    },
  };

  // Browsers only allow audio after a user gesture: load the wasm on the
  // first click, so SDL opens its AudioContext inside the gesture handler.
  const startEl = document.getElementById('start');
  startEl.addEventListener('click', () => {
    startEl.remove();
    const s = document.createElement('script');
    s.src = 'beeper.js';
    document.body.appendChild(s);
  }, { once: true });

  document.body.addEventListener('click', () => term.focus());
</script>
</body>
</html>
